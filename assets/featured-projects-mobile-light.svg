<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 440 472" width="100%" height="100%">
  <defs>
    <!-- Fonts styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .title {
        font-weight: 800;
        font-size: 20px;
        fill: #24292F;
        letter-spacing: -0.02em;
      }
      .repo-name {
        font-weight: 500;
        font-size: 11.5px;
        fill: #0F766E;
        letter-spacing: -0.01em;
      }
      .subtitle {
        font-weight: 600;
        font-size: 13.5px;
        fill: #57606A;
        letter-spacing: -0.01em;
      }
      .description {
        font-weight: 400;
        font-size: 12.5px;
        fill: #57606A;
        line-height: 1.45;
      }
      .chip-text {
        font-weight: 500;
        font-size: 11.5px;
        fill: #24292F;
      }
      .badge-text {
        font-weight: 600;
        font-size: 10px;
        fill: #0F766E;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .data-text {
        font-weight: 600;
        font-size: 11px;
        fill: #0F766E;
        letter-spacing: -0.01em;
      }

      /* Premium Animations */
      .glow-pulse-top {
        animation: pulseGlow 4s ease-in-out infinite alternate;
        transform-origin: 420px 6px;
      }
      .glow-pulse-bottom {
        animation: pulseGlow 4s ease-in-out 2s infinite alternate;
        transform-origin: 420px 240px;
      }
      @keyframes pulseGlow {
        0% { opacity: 0.35; transform: scale(0.92); }
        100% { opacity: 0.9; transform: scale(1.08); }
      }

      .float-icon {
        animation: floatMotion 3.5s ease-in-out infinite;
      }
      @keyframes floatMotion {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }

      .shimmer-bar-top {
        animation: shimmerMove 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .shimmer-bar-bottom {
        animation: shimmerMove 5s cubic-bezier(0.4, 0, 0.2, 1) 2.5s infinite;
      }
      @keyframes shimmerMove {
        0% { transform: translateX(-440px); }
        35%, 100% { transform: translateX(440px); }
      }

      .dot-pulse {
        animation: dotBlink 2s ease-in-out infinite alternate;
      }
      @keyframes dotBlink {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
      }

      .accent-line-pulse {
        animation: lineGlow 3s ease-in-out infinite alternate;
      }
      @keyframes lineGlow {
        0% { opacity: 0.7; stroke-width: 3; }
        100% { opacity: 1; stroke-width: 4; }
      }
    </style>

    <!-- Filters for premium UI feel (subtle shadow for light mode) -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="card-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0D7DE"/>
      <stop offset="40%" stop-color="#E1E5EA"/>
      <stop offset="100%" stop-color="#D0D7DE"/>
    </linearGradient>

    <radialGradient id="glow-top" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-bottom" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0F766E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </linearGradient>

    <!-- Blueprint tiny grid pattern -->
    <pattern id="blueprint-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#D0D7DE" stroke-width="1" opacity="0.25"/>
    </pattern>

    <!-- Clips for rounded card contents -->
    <clipPath id="m-card-clip-top">
      <rect x="20" y="6" width="400" height="218" rx="14"/>
    </clipPath>
    <clipPath id="m-card-clip-bottom">
      <rect x="20" y="240" width="400" height="218" rx="14"/>
    </clipPath>
  </defs>

  <!-- Transparent Background Canvas for Seamless GitHub Integration -->

  <!-- ==================== TOP CARD: SaveethaHub ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="20" y="6" width="400" height="218" rx="14" fill="#F6F8FA" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#m-card-clip-top)">
      <rect x="20" y="6" width="400" height="218" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse-top" cx="420" cy="6" r="220" fill="url(#glow-top)"/>
      <rect class="shimmer-bar-top" x="20" y="6" width="220" height="218" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="20" y1="6" x2="420" y2="6" stroke="#0F766E" stroke-width="3.5"/>
    </g>

    <path d="M 32 24 L 32 16 L 40 16" fill="none" stroke="#0F766E" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Header Row: Logo Icon NEXT TO Title -->
    <g transform="translate(36, 22)">
      <g class="float-icon">
        <rect x="0" y="0" width="34" height="34" rx="7" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
        <circle cx="6" cy="6" r="2" fill="#EF4444"/>
        <circle cx="11" cy="6" r="2" fill="#F59E0B"/>
        <circle cx="16" cy="6" r="2" fill="#10B981"/>
        <rect x="4" y="11" width="26" height="2.5" rx="1" fill="#E1E5EA"/>
        <rect x="4" y="16" width="10" height="10" rx="1.5" fill="#0F766E" fill-opacity="0.1" stroke="#0F766E" stroke-width="0.8"/>
        <rect x="17" y="16" width="13" height="2" rx="1" fill="#57606A"/>
        <rect x="17" y="20" width="13" height="2" rx="1" fill="#57606A"/>
        <rect x="17" y="24" width="8" height="2" rx="1" fill="#57606A"/>
      </g>
      <text x="44" y="18" class="title">SaveethaHub</text>
      <text x="44" y="31" class="repo-name">ComradeMohan / saveetha-companion</text>
    </g>

    <g transform="translate(308, 22)">
      <rect x="0" y="0" width="88" height="22" rx="11" fill="#CCFBF1" stroke="#0F766E" stroke-width="1"/>
      <text x="44" y="14" class="badge-text" text-anchor="middle">WEB PLATFORM</text>
    </g>

    <text x="36" y="76" class="subtitle">Academic platform built for SIMATS students.</text>

    <text x="36" y="98" class="description">Full-stack platform helping university students with</text>
    <text x="36" y="115" class="description">study resources, calculators, AI tools, and notes.</text>

    <line x1="36" y1="131" x2="404" y2="131" stroke="#D0D7DE" stroke-width="1"/>

    <!-- Bottom Row (Chips & Data) -->
    <g transform="translate(36, 143)">
      <rect x="0" y="0" width="62" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="10" cy="11" r="2.5" fill="#0F766E"/>
      <text x="18" y="15" class="chip-text">Next.js</text>

      <rect x="68" y="0" width="66" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="78" cy="11" r="2.5" fill="#0F766E"/>
      <text x="86" y="15" class="chip-text">Firebase</text>

      <rect x="140" y="0" width="70" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="150" cy="11" r="2.5" fill="#0F766E"/>
      <text x="158" y="15" class="chip-text">Supabase</text>

      <rect x="216" y="0" width="72" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="226" cy="11" r="2.5" fill="#0F766E"/>
      <text x="234" y="15" class="chip-text">Gemini AI</text>
    </g>

    <g transform="translate(36, 173)">
      <rect x="0" y="0" width="368" height="23" rx="11.5" fill="#E6F4F1" stroke="#0F766E" stroke-width="1"/>
      <g transform="translate(10, 5)">
        <path d="M5 1a4 4 0 0 0-1.3 7.8c.2.1.3 0 .3-.2v-.7c-1.1.2-1.3-.6-1.3-.6-.2-.4-.4-.6-.4-.6-.3-.2 0-.2 0-.2.4 0 .6.3.6.3.4.6 1 .4 1.2.3 0-.3.2-.4.3-.6-.9-.1-1.8-.4-1.8-2 0-.4.1-.8.4-1.1a1.5 1.5 0 0 1 .1-1.1s.3-.1 1.1.3a3.8 3.8 0 0 1 2 0c.8-.4 1.1-.3 1.1-.3a1.5 1.5 0 0 1 .1 1.1c.3.3.4.7.4 1.1 0 1.6-.9 1.9-1.8 2 .2.2.3.4.3.8v1.2c0 .2.1.3.3.2A4 4 0 0 0 5 1z" fill="#0F766E"/>
      </g>
      <text x="26" y="16" class="data-text">GitHub • 1000+ Active SIMATS Students</text>
    </g>
  </g>

  <!-- ==================== BOTTOM CARD: UniVault ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="20" y="240" width="400" height="218" rx="14" fill="#F6F8FA" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#m-card-clip-bottom)">
      <rect x="20" y="240" width="400" height="218" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse-bottom" cx="420" cy="240" r="220" fill="url(#glow-bottom)"/>
      <rect class="shimmer-bar-bottom" x="20" y="240" width="220" height="218" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="20" y1="240" x2="420" y2="240" stroke="#0F766E" stroke-width="3.5"/>
    </g>

    <path d="M 32 258 L 32 250 L 40 250" fill="none" stroke="#0F766E" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Header Row: Logo Icon NEXT TO Title -->
    <g transform="translate(36, 256)">
      <g class="float-icon">
        <rect x="0" y="0" width="34" height="34" rx="7" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
        <g transform="translate(7, 5)" fill="#0F766E">
          <path d="M3 5.5 A 5.5 5.5 0 0 1 14 5.5 Z"/>
          <line x1="5" y1="2.5" x2="3" y2="0.8" stroke="#0F766E" stroke-width="1.1" stroke-linecap="round"/>
          <line x1="12" y1="2.5" x2="14" y2="0.8" stroke="#0F766E" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="6" cy="3.5" r="0.7" fill="#FFFFFF"/>
          <circle cx="11" cy="3.5" r="0.7" fill="#FFFFFF"/>
          <rect x="2" y="7" width="13" height="9" rx="1.5"/>
          <rect x="-0.6" y="7" width="1.8" height="8" rx="0.9"/>
          <rect x="15.8" y="7" width="1.8" height="8" rx="0.9"/>
          <rect x="4.5" y="16.5" width="2.4" height="3.5" rx="1"/>
          <rect x="10.1" y="16.5" width="2.4" height="3.5" rx="1"/>
        </g>
      </g>
      <text x="44" y="18" class="title">UniVault</text>
      <text x="44" y="31" class="repo-name">com.simats.univault</text>
    </g>

    <g transform="translate(308, 256)">
      <rect x="0" y="0" width="88" height="22" rx="11" fill="#CCFBF1" stroke="#0F766E" stroke-width="1"/>
      <text x="44" y="14" class="badge-text" text-anchor="middle">ANDROID APP</text>
    </g>

    <text x="36" y="310" class="subtitle">Android exam preparation app.</text>

    <text x="36" y="332" class="description">Android app for university students featuring</text>
    <text x="36" y="349" class="description">structured resources &amp; previous exam papers.</text>

    <line x1="36" y1="365" x2="404" y2="365" stroke="#D0D7DE" stroke-width="1"/>

    <!-- Bottom Row (Chips & Data) -->
    <g transform="translate(36, 377)">
      <rect x="0" y="0" width="58" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="10" cy="11" r="2.5" fill="#0F766E"/>
      <text x="18" y="15" class="chip-text">Kotlin</text>

      <rect x="64" y="0" width="48" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="74" cy="11" r="2.5" fill="#0F766E"/>
      <text x="82" y="15" class="chip-text">PHP</text>

      <rect x="118" y="0" width="64" height="22" rx="11" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
      <circle class="dot-pulse" cx="128" cy="11" r="2.5" fill="#0F766E"/>
      <text x="136" y="15" class="chip-text">Android</text>
    </g>

    <g transform="translate(36, 407)">
      <rect x="0" y="0" width="368" height="23" rx="11.5" fill="#E6F4F1" stroke="#0F766E" stroke-width="1"/>
      <g transform="translate(10, 5)">
        <path d="M3 1.5l6 4.5-6 4.5z" fill="#0F766E"/>
      </g>
      <text x="24" y="16" class="data-text">Google Play Store Verified • com.simats.univault</text>
    </g>
  </g>
</svg>
