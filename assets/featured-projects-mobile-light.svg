<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 440 604" width="100%" height="100%">
  <defs>
    <!-- Fonts styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .title {
        font-weight: 800;
        font-size: 22px;
        fill: #24292F;
        letter-spacing: -0.03em;
      }
      .repo-name {
        font-weight: 500;
        font-size: 11.5px;
        fill: #0F766E;
        letter-spacing: -0.01em;
      }
      .subtitle {
        font-weight: 600;
        font-size: 14.5px;
        fill: #57606A;
        letter-spacing: -0.01em;
      }
      .description {
        font-weight: 400;
        font-size: 13.5px;
        fill: #57606A;
        line-height: 1.4;
      }
      .chip-text {
        font-weight: 500;
        font-size: 12px;
        fill: #24292F;
      }
      .badge-text {
        font-weight: 600;
        font-size: 11px;
        fill: #0F766E;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .data-text {
        font-weight: 600;
        font-size: 11.5px;
        fill: #0F766E;
        letter-spacing: -0.01em;
      }

      /* Premium Animations */
      .glow-pulse-top {
        animation: pulseGlow 4s ease-in-out infinite alternate;
        transform-origin: 420px 16px;
      }
      .glow-pulse-bottom {
        animation: pulseGlow 4s ease-in-out 2s infinite alternate;
        transform-origin: 420px 316px;
      }
      @keyframes pulseGlow {
        0% { opacity: 0.35; transform: scale(0.92); }
        100% { opacity: 0.9; transform: scale(1.08); }
      }

      .float-icon {
        animation: floatMotion 3.5s ease-in-out infinite;
      }
      @keyframes floatMotion {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }

      .shimmer-bar-top {
        animation: shimmerMove 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .shimmer-bar-bottom {
        animation: shimmerMove 5s cubic-bezier(0.4, 0, 0.2, 1) 2.5s infinite;
      }
      @keyframes shimmerMove {
        0% { transform: translateX(-440px); }
        35%, 100% { transform: translateX(440px); }
      }

      .dot-pulse {
        animation: dotBlink 2s ease-in-out infinite alternate;
      }
      @keyframes dotBlink {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
      }

      .accent-line-pulse {
        animation: lineGlow 3s ease-in-out infinite alternate;
      }
      @keyframes lineGlow {
        0% { opacity: 0.7; stroke-width: 3; }
        100% { opacity: 1; stroke-width: 4; }
      }
    </style>

    <!-- Filters for premium UI feel (subtle shadow for light mode) -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="card-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D0D7DE"/>
      <stop offset="40%" stop-color="#E1E5EA"/>
      <stop offset="100%" stop-color="#D0D7DE"/>
    </linearGradient>

    <radialGradient id="glow-top" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-bottom" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0F766E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F766E" stop-opacity="0"/>
    </linearGradient>

    <!-- Blueprint tiny grid pattern -->
    <pattern id="blueprint-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#D0D7DE" stroke-width="1.2" opacity="0.25"/>
    </pattern>

    <!-- Clips for rounded card contents -->
    <clipPath id="m-card-clip-top">
      <rect x="20" y="16" width="400" height="268" rx="16"/>
    </clipPath>
    <clipPath id="m-card-clip-bottom">
      <rect x="20" y="316" width="400" height="268" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>

  <!-- ==================== TOP CARD: SaveethaHub ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="20" y="16" width="400" height="268" rx="16" fill="#F6F8FA" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#m-card-clip-top)">
      <rect x="20" y="16" width="400" height="268" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse-top" cx="420" cy="16" r="220" fill="url(#glow-top)"/>
      <rect class="shimmer-bar-top" x="20" y="16" width="240" height="268" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="20" y1="16" x2="420" y2="16" stroke="#0F766E" stroke-width="4"/>
    </g>

    <path d="M 32 36 L 32 26 L 42 26" fill="none" stroke="#0F766E" stroke-width="2" stroke-linecap="round"/>

    <!-- Header Row: Logo Icon NEXT TO Title -->
    <g transform="translate(36, 32)">
      <g class="float-icon">
        <rect x="0" y="0" width="36" height="36" rx="7" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
        <circle cx="6" cy="6" r="2" fill="#EF4444"/>
        <circle cx="11" cy="6" r="2" fill="#F59E0B"/>
        <circle cx="16" cy="6" r="2" fill="#10B981"/>
        <rect x="4" y="12" width="28" height="2.5" rx="1" fill="#E1E5EA"/>
        <rect x="4" y="17" width="11" height="11" rx="1.5" fill="#0F766E" fill-opacity="0.1" stroke="#0F766E" stroke-width="0.8"/>
        <rect x="18" y="17" width="13" height="2" rx="1" fill="#57606A"/>
        <rect x="18" y="21" width="13" height="2" rx="1" fill="#57606A"/>
        <rect x="18" y="25" width="8" height="2" rx="1" fill="#57606A"/>
      </g>
      <text x="46" y="20" class="title">SaveethaHub</text>
      <text x="46" y="34" class="repo-name">ComradeMohan / saveetha-companion</text>
    </g>

    <g transform="translate(312, 32)">
      <rect x="0" y="0" width="92" height="24" rx="12" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.2"/>
      <text x="46" y="15" class="badge-text" text-anchor="middle">WEB PLATFORM</text>
    </g>

    <text x="36" y="92" class="subtitle">Academic platform built for SIMATS students.</text>

    <!-- Description (3 lines wrapped for 400px screen) -->
    <text x="36" y="116" class="description">Full-stack academic platform helping thousands of</text>
    <text x="36" y="134" class="description">SIMATS university students with study resources,</text>
    <text x="36" y="152" class="description">calculators, AI tools, notes, &amp; productivity features.</text>

    <line x1="36" y1="168" x2="404" y2="168" stroke="#D0D7DE" stroke-width="1"/>

    <!-- Bottom Tech Stack & Data (Row 1: Chips, Row 2: Data Badge) -->
    <g transform="translate(36, 180)">
      <!-- Row 1: Chips -->
      <rect x="0" y="0" width="80" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="11" cy="12" r="2.5" fill="#0F766E"/>
      <text x="20" y="16" class="chip-text">Next.js</text>

      <rect x="86" y="0" width="86" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="97" cy="12" r="2.5" fill="#0F766E"/>
      <text x="106" y="16" class="chip-text">Firebase</text>

      <rect x="178" y="0" width="92" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="189" cy="12" r="2.5" fill="#0F766E"/>
      <text x="198" y="16" class="chip-text">Supabase</text>

      <rect x="276" y="0" width="92" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="287" cy="12" r="2.5" fill="#0F766E"/>
      <text x="296" y="16" class="chip-text">Gemini AI</text>

      <!-- Row 2: Full Width Mobile Data Badge -->
      <rect x="0" y="32" width="368" height="26" rx="13" fill="#E6F4F1" stroke="#0F766E" stroke-width="1.2"/>
      <g transform="translate(12, 37)">
        <path d="M6 1.2a4.8 4.8 0 0 0-1.5 9.4c.2.1.3-.1.3-.3v-0.8c-1.3.3-1.6-.7-1.6-.7-.2-.5-.5-.7-.5-.7-.4-.3.1-.3.1-.3.4.1.7.4.7.4.4.7 1.1.5 1.4.4.1-.3.2-.5.3-.7-1.1-.1-2.2-.5-2.2-2.4 0-.5.2-1 .4-1.4a1.7 1.7 0 0 1 .1-1.3s.4-.1 1.3.4a4.5 4.5 0 0 1 2.4 0c.9-.6 1.3-.4 1.3-.4a1.7 1.7 0 0 1 .1 1.3c.3.4.4.8.4 1.4 0 1.9-1.1 2.3-2.2 2.4.2.2.3.5.3 .9v1.4c0 .2.1.3.3.3A4.8 4.8 0 0 0 6 1.2z" fill="#0F766E"/>
      </g>
      <text x="28" y="49" class="data-text">GitHub • 1000+ Active SIMATS Students</text>
    </g>
  </g>

  <!-- ==================== BOTTOM CARD: UniVault ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="20" y="316" width="400" height="268" rx="16" fill="#F6F8FA" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#m-card-clip-bottom)">
      <rect x="20" y="316" width="400" height="268" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse-bottom" cx="420" cy="316" r="220" fill="url(#glow-bottom)"/>
      <rect class="shimmer-bar-bottom" x="20" y="316" width="240" height="268" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="20" y1="316" x2="420" y2="316" stroke="#0F766E" stroke-width="4"/>
    </g>

    <path d="M 32 336 L 32 326 L 42 326" fill="none" stroke="#0F766E" stroke-width="2" stroke-linecap="round"/>

    <!-- Header Row: Logo Icon NEXT TO Title -->
    <g transform="translate(36, 332)">
      <g class="float-icon">
        <rect x="0" y="0" width="36" height="36" rx="7" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
        <g transform="translate(7, 5)" fill="#0F766E">
          <path d="M3.5 6 A 6 6 0 0 1 15.5 6 Z"/>
          <line x1="5" y1="3" x2="3" y2="1" stroke="#0F766E" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="14" y1="3" x2="16" y2="1" stroke="#0F766E" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="7" cy="4" r="0.7" fill="#FFFFFF"/>
          <circle cx="12" cy="4" r="0.7" fill="#FFFFFF"/>
          <rect x="2" y="8" width="15" height="10" rx="1.8"/>
          <rect x="-0.7" y="8" width="2.1" height="9" rx="1"/>
          <rect x="17.6" y="8" width="2.1" height="9" rx="1"/>
          <rect x="5" y="19" width="2.6" height="4" rx="1"/>
          <rect x="11.4" y="19" width="2.6" height="4" rx="1"/>
        </g>
      </g>
      <text x="46" y="20" class="title">UniVault</text>
      <text x="46" y="34" class="repo-name">com.simats.univault</text>
    </g>

    <g transform="translate(312, 332)">
      <rect x="0" y="0" width="92" height="24" rx="12" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.2"/>
      <text x="46" y="15" class="badge-text" text-anchor="middle">ANDROID APP</text>
    </g>

    <text x="36" y="392" class="subtitle">Android exam preparation app.</text>

    <!-- Description (3 lines wrapped for 400px screen) -->
    <text x="36" y="416" class="description">Android application for university students featuring</text>
    <text x="36" y="434" class="description">structured resources, previous exam papers, and a</text>
    <text x="36" y="452" class="description">productivity-focused learning experience.</text>

    <line x1="36" y1="468" x2="404" y2="468" stroke="#D0D7DE" stroke-width="1"/>

    <!-- Bottom Tech Stack & Data (Row 1: Chips, Row 2: Data Badge) -->
    <g transform="translate(36, 480)">
      <!-- Row 1: Chips -->
      <rect x="0" y="0" width="76" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="11" cy="12" r="2.5" fill="#0F766E"/>
      <text x="20" y="16" class="chip-text">Kotlin</text>

      <rect x="82" y="0" width="64" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="93" cy="12" r="2.5" fill="#0F766E"/>
      <text x="102" y="16" class="chip-text">PHP</text>

      <rect x="152" y="0" width="84" height="24" rx="12" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="163" cy="12" r="2.5" fill="#0F766E"/>
      <text x="172" y="16" class="chip-text">Android</text>

      <!-- Row 2: Full Width Mobile Data Badge -->
      <rect x="0" y="32" width="368" height="26" rx="13" fill="#E6F4F1" stroke="#0F766E" stroke-width="1.2"/>
      <g transform="translate(12, 37)">
        <path d="M3.5 1.8l7 5-7 5z" fill="#0F766E"/>
      </g>
      <text x="26" y="49" class="data-text">Google Play Store Verified • com.simats.univault</text>
    </g>
  </g>
</svg>
