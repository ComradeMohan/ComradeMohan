<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1600 268" width="100%" height="100%">
  <defs>
    <!-- Fonts styling -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .title {
        font-weight: 800;
        font-size: 26px;
        fill: #F0F6FC;
        letter-spacing: -0.03em;
      }
      .repo-name {
        font-weight: 500;
        font-size: 13px;
        fill: #2DD4BF;
        letter-spacing: -0.01em;
      }
      .subtitle {
        font-weight: 600;
        font-size: 17px;
        fill: #8B949E;
        letter-spacing: -0.01em;
      }
      .description {
        font-weight: 400;
        font-size: 15px;
        fill: #8B949E;
        line-height: 1.4;
      }
      .chip-text {
        font-weight: 500;
        font-size: 14px;
        fill: #F0F6FC;
      }
      .badge-text {
        font-weight: 600;
        font-size: 12px;
        fill: #2DD4BF;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .data-text {
        font-weight: 600;
        font-size: 13px;
        fill: #2DD4BF;
        letter-spacing: -0.01em;
      }

      /* Premium Animations */
      .glow-pulse {
        animation: pulseGlow 4s ease-in-out infinite alternate;
        transform-origin: 784px 16px;
      }
      .glow-pulse-right {
        animation: pulseGlow 4s ease-in-out 2s infinite alternate;
        transform-origin: 1580px 16px;
      }
      @keyframes pulseGlow {
        0% { opacity: 0.35; transform: scale(0.92); }
        100% { opacity: 0.9; transform: scale(1.08); }
      }

      .float-icon {
        animation: floatMotion 3.5s ease-in-out infinite;
      }
      @keyframes floatMotion {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }

      .shimmer-bar-left {
        animation: shimmerMoveLeft 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes shimmerMoveLeft {
        0% { transform: translateX(-800px); }
        35%, 100% { transform: translateX(800px); }
      }

      .shimmer-bar-right {
        animation: shimmerMoveRight 5s cubic-bezier(0.4, 0, 0.2, 1) 2.5s infinite;
      }
      @keyframes shimmerMoveRight {
        0% { transform: translateX(-800px); }
        35%, 100% { transform: translateX(800px); }
      }

      .dot-pulse {
        animation: dotBlink 2s ease-in-out infinite alternate;
      }
      @keyframes dotBlink {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
      }

      .accent-line-pulse {
        animation: lineGlow 3s ease-in-out infinite alternate;
      }
      @keyframes lineGlow {
        0% { opacity: 0.7; stroke-width: 3.5; }
        100% { opacity: 1; stroke-width: 4.5; }
      }
    </style>

    <!-- Filters for premium UI feel -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="card-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30363D"/>
      <stop offset="40%" stop-color="#484F58"/>
      <stop offset="100%" stop-color="#30363D"/>
    </linearGradient>

    <radialGradient id="glow-left" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-right" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2DD4BF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>

    <!-- Blueprint tiny grid pattern -->
    <pattern id="blueprint-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#30363D" stroke-width="1.2" opacity="0.18"/>
    </pattern>

    <!-- Clips for rounded card contents -->
    <clipPath id="card-clip-left">
      <rect x="20" y="16" width="764" height="236" rx="16"/>
    </clipPath>
    <clipPath id="card-clip-right">
      <rect x="816" y="16" width="764" height="236" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#0D1117"/>

  <!-- ==================== LEFT CARD: SaveethaHub ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="20" y="16" width="764" height="236" rx="16" fill="#161B22" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#card-clip-left)">
      <rect x="20" y="16" width="764" height="236" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse" cx="784" cy="16" r="260" fill="url(#glow-left)"/>
      <rect class="shimmer-bar-left" x="20" y="16" width="400" height="236" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="20" y1="16" x2="784" y2="16" stroke="#2DD4BF" stroke-width="4"/>
    </g>

    <!-- Corner Accent Bracket -->
    <path d="M 34 38 L 34 26 L 46 26" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>

    <!-- Header Row: Logo NEXT TO Name -->
    <g transform="translate(48, 34)">
      <!-- Project Icon: Browser -->
      <g class="float-icon">
        <rect x="0" y="0" width="40" height="40" rx="8" fill="#1F242C" stroke="#30363D" stroke-width="1.5"/>
        <circle cx="7" cy="7" r="2.2" fill="#EF4444"/>
        <circle cx="13" cy="7" r="2.2" fill="#F59E0B"/>
        <circle cx="19" cy="7" r="2.2" fill="#10B981"/>
        <rect x="5" y="13" width="30" height="3" rx="1" fill="#30363D"/>
        <rect x="5" y="19" width="13" height="13" rx="2" fill="#2DD4BF" fill-opacity="0.2" stroke="#2DD4BF" stroke-width="0.8"/>
        <rect x="21" y="19" width="14" height="2.5" rx="1" fill="#8B949E"/>
        <rect x="21" y="24" width="14" height="2.5" rx="1" fill="#8B949E"/>
        <rect x="21" y="29" width="8" height="2.5" rx="1" fill="#8B949E"/>
      </g>

      <!-- Title & Repo Name RIGHT NEXT TO LOGO -->
      <text x="52" y="22" class="title">SaveethaHub</text>
      <text x="52" y="37" class="repo-name">ComradeMohan / saveetha-companion</text>
    </g>

    <!-- Category Badge (Top-Right) -->
    <g transform="translate(624, 34)">
      <rect x="0" y="0" width="132" height="28" rx="14" fill="#132B2A" stroke="#2DD4BF" stroke-width="1.2"/>
      <text x="66" y="18" class="badge-text" text-anchor="middle">Web Platform</text>
    </g>

    <!-- Subtitle -->
    <text x="48" y="104" class="subtitle">Academic platform built for SIMATS students.</text>

    <!-- Description -->
    <text x="48" y="130" class="description">Full-stack academic platform helping thousands of university students</text>
    <text x="48" y="150" class="description">with resources, calculators, AI tools, notes, and productivity features.</text>

    <!-- Accent Divider -->
    <line x1="48" y1="170" x2="756" y2="170" stroke="#30363D" stroke-width="1"/>

    <!-- Bottom Row (Fits like a glove, zero gap below) -->
    <g transform="translate(48, 184)">
      <!-- Tech Chip 1 -->
      <rect x="0" y="0" width="96" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="13" cy="14" r="3" fill="#2DD4BF"/>
      <text x="23" y="19" class="chip-text">Next.js</text>

      <!-- Tech Chip 2 -->
      <rect x="104" y="0" width="104" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="117" cy="14" r="3" fill="#2DD4BF"/>
      <text x="127" y="19" class="chip-text">Firebase</text>

      <!-- Tech Chip 3 -->
      <rect x="216" y="0" width="108" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="229" cy="14" r="3" fill="#2DD4BF"/>
      <text x="239" y="19" class="chip-text">Supabase</text>

      <!-- Tech Chip 4 -->
      <rect x="332" y="0" width="112" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="345" cy="14" r="3" fill="#2DD4BF"/>
      <text x="355" y="19" class="chip-text">Gemini AI</text>

      <!-- Highlight Data Badge (Fills lower right) -->
      <rect x="452" y="0" width="256" height="28" rx="14" fill="#142824" stroke="#2DD4BF" stroke-width="1.2"/>
      <g transform="translate(464, 6)">
        <path d="M7 1.4a5.6 5.6 0 0 0-1.8 11c.3.1.4-.1.4-.3v-1c-1.6.4-1.9-.8-1.9-.8-.3-.6-.6-.9-.6-.9-.5-.3.1-.3.1-.3.5.1.9.5.9.5.5.9 1.3.6 1.6.5.1-.3.2-.6.4-.8-1.3-.2-2.6-.6-2.6-2.8 0-.6.2-1.2.5-1.6a2 2 0 0 1 .1-1.5s.5-.2 1.6.5a5.3 5.3 0 0 1 2.8 0c1.1-.7 1.6-.5 1.6-.5a2 2 0 0 1 .1 1.5c.3.4.5 1 .5 1.6 0 2.2-1.3 2.6-2.6 2.8.2.2.4.6.4 1.1v1.7c0 .2.1.4.4.3A5.6 5.6 0 0 0 7 1.4z" fill="#2DD4BF"/>
      </g>
      <text x="484" y="19" class="data-text">1000+ Students • Open Source</text>
    </g>
  </g>

  <!-- ==================== RIGHT CARD: UniVault ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="816" y="16" width="764" height="236" rx="16" fill="#161B22" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#card-clip-right)">
      <rect x="816" y="16" width="764" height="236" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse-right" cx="1580" cy="16" r="260" fill="url(#glow-right)"/>
      <rect class="shimmer-bar-right" x="816" y="16" width="400" height="236" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="816" y1="16" x2="1580" y2="16" stroke="#2DD4BF" stroke-width="4"/>
    </g>

    <!-- Corner Accent Bracket -->
    <path d="M 830 38 L 830 26 L 842 26" fill="none" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>

    <!-- Header Row: Logo NEXT TO Name -->
    <g transform="translate(844, 34)">
      <!-- Project Icon: Android -->
      <g class="float-icon">
        <rect x="0" y="0" width="40" height="40" rx="8" fill="#1F242C" stroke="#30363D" stroke-width="1.5"/>
        <g transform="translate(8, 6)" fill="#2DD4BF">
          <path d="M4 7 A 7 7 0 0 1 18 7 Z"/>
          <line x1="6" y1="3.5" x2="3.5" y2="1" stroke="#2DD4BF" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="15" y1="3.5" x2="17.5" y2="1" stroke="#2DD4BF" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="8" cy="4.5" r="0.8" fill="#161B22"/>
          <circle cx="14" cy="4.5" r="0.8" fill="#161B22"/>
          <rect x="2.5" y="9" width="17" height="12" rx="2"/>
          <rect x="-0.8" y="9" width="2.4" height="10" rx="1.2"/>
          <rect x="19.8" y="9" width="2.4" height="10" rx="1.2"/>
          <rect x="5.5" y="22" width="3" height="4.5" rx="1.3"/>
          <rect x="13.5" y="22" width="3" height="4.5" rx="1.3"/>
        </g>
      </g>

      <!-- Title & App Name RIGHT NEXT TO LOGO -->
      <text x="52" y="22" class="title">UniVault</text>
      <text x="52" y="37" class="repo-name">com.simats.univault</text>
    </g>

    <!-- Category Badge (Top-Right) -->
    <g transform="translate(1420, 34)">
      <rect x="0" y="0" width="132" height="28" rx="14" fill="#132B2A" stroke="#2DD4BF" stroke-width="1.2"/>
      <text x="66" y="18" class="badge-text" text-anchor="middle">Android App</text>
    </g>

    <!-- Subtitle -->
    <text x="844" y="104" class="subtitle">Android exam preparation app.</text>

    <!-- Description -->
    <text x="844" y="130" class="description">Android application for university students featuring structured resources,</text>
    <text x="844" y="150" class="description">previous exam papers, and a productivity-focused learning experience.</text>

    <!-- Accent Divider -->
    <line x1="844" y1="170" x2="1552" y2="170" stroke="#30363D" stroke-width="1"/>

    <!-- Bottom Row (Fits like a glove, zero gap below) -->
    <g transform="translate(844, 184)">
      <!-- Tech Chip 1 -->
      <rect x="0" y="0" width="92" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="13" cy="14" r="3" fill="#2DD4BF"/>
      <text x="23" y="19" class="chip-text">Kotlin</text>

      <!-- Tech Chip 2 -->
      <rect x="100" y="0" width="80" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="113" cy="14" r="3" fill="#2DD4BF"/>
      <text x="123" y="19" class="chip-text">PHP</text>

      <!-- Tech Chip 3 -->
      <rect x="188" y="0" width="100" height="28" rx="14" fill="#21262D" stroke="#30363D" stroke-width="1.2"/>
      <circle class="dot-pulse" cx="201" cy="14" r="3" fill="#2DD4BF"/>
      <text x="211" y="19" class="chip-text">Android</text>

      <!-- Highlight Data Badge (Fills lower right) -->
      <rect x="296" y="0" width="412" height="28" rx="14" fill="#142824" stroke="#2DD4BF" stroke-width="1.2"/>
      <g transform="translate(308, 6)">
        <path d="M4 2.2l8 5.8-8 5.8z" fill="#2DD4BF"/>
      </g>
      <text x="326" y="19" class="data-text">Google Play Store Verified • Past Papers &amp; Resources</text>
    </g>
  </g>
</svg>
