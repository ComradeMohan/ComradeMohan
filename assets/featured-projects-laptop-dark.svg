 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 758 380" width="100%">
  <defs>
    <linearGradient id="cardBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="accentTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>

    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Sweeping shine gradient -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5eead4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shine2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip paths so shine stays inside each card -->
    <clipPath id="clip1"><rect x="16" y="16" width="355" height="348" rx="16"/></clipPath>
    <clipPath id="clip2"><rect x="387" y="16" width="355" height="348" rx="16"/></clipPath>

    <style>
      .card-border {
        stroke: url(#accentTeal);
        stroke-width: 1.2;
        fill: none;
        opacity: 0.55;
      }
      .card-border-2 {
        stroke: url(#accentPurple);
        stroke-width: 1.2;
        fill: none;
        opacity: 0.55;
      }

      /* Orbiting corner glow — travels along the border */
      .orbit {
        stroke-dasharray: 110 1300;
        animation: orbit 6s linear infinite;
        filter: url(#softGlow);
      }
      @keyframes orbit {
        to { stroke-dashoffset: -1410; }
      }

      /* Sweeping diagonal shine */
      .shine-band {
        animation: sweep 4.5s ease-in-out infinite;
      }
      @keyframes sweep {
        0%   { transform: translateX(-420px); opacity: 0; }
        20%  { opacity: 0.9; }
        60%  { opacity: 0.9; }
        100% { transform: translateX(420px); opacity: 0; }
      }

      /* Category pill soft pulse */
      .pill-pulse { animation: pill 2.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes pill {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.72; }
      }

      /* Status dot */
      .dot {
        animation: dot 1.6s ease-in-out infinite;
        transform-origin: center;
        transform-box: fill-box;
      }
      @keyframes dot {
        0%,100% { transform: scale(1);   opacity: 1; }
        50%     { transform: scale(1.35); opacity: 0.55; }
      }

      /* Underline draw */
      .underline {
        stroke-dasharray: 320;
        stroke-dashoffset: 320;
        animation: draw 3.2s ease-in-out infinite;
      }
      @keyframes draw {
        0%   { stroke-dashoffset: 320; }
        45%  { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -320; }
      }

      /* Tag hover-like breathing */
      .tag { animation: tagFloat 4s ease-in-out infinite; }
      .tag:nth-child(2) { animation-delay: 0.4s; }
      .tag:nth-child(3) { animation-delay: 0.8s; }
      .tag:nth-child(4) { animation-delay: 1.2s; }
      @keyframes tagFloat {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-1.5px); }
      }

      .mono { font-family: ui-monospace, Menlo, Consolas, monospace; }
      .title { font-weight: 700; letter-spacing: -0.3px; }
    </style>
  </defs>

  <!-- ===================== LEFT CARD: SaveethaHub ===================== -->
  <g>
    <!-- Base card -->
    <rect x="16" y="16" width="355" height="348" rx="16" fill="url(#cardBg1)" stroke="#1f2937" stroke-width="1"/>

    <!-- Static soft border -->
    <rect x="16.6" y="16.6" width="353.8" height="346.8" rx="15.6" class="card-border"/>

    <!-- Orbiting glow segment -->
    <rect x="16.6" y="16.6" width="353.8" height="346.8" rx="15.6"
          fill="none" stroke="#5eead4" stroke-width="2" class="orbit"/>

    <!-- Top accent bar -->
    <rect x="16" y="16" width="355" height="2.5" rx="1" fill="url(#accentTeal)" filter="url(#softGlow)"/>

    <!-- Sweeping shine -->
    <g clip-path="url(#clip1)">
      <rect class="shine-band" x="-60" y="16" width="120" height="348" fill="url(#shine)" opacity="0.7" transform="skewX(-18)"/>
    </g>

    <!-- Category pill -->
    <g class="pill-pulse">
      <rect x="256" y="34" width="102" height="24" rx="12" fill="#0f3d38" stroke="#14b8a6" stroke-width="0.6"/>
      <circle cx="270" cy="46" r="3" fill="#5eead4" class="dot"/>
      <text x="278" y="50" fill="#5eead4" font-size="11" font-weight="600">Web Platform</text>
    </g>

    <!-- Title -->
    <text x="34" y="76" fill="#f1f5f9" font-size="26" class="title">SaveethaHub</text>

    <!-- Description -->
    <text x="34" y="106" fill="#94a3b8" font-size="12.5">Premium academic platform for students,</text>
    <text x="34" y="123" fill="#94a3b8" font-size="12.5">powered by modern web tools.</text>

    <!-- Tech Stack -->
    <text x="34" y="156" fill="#64748b" font-size="10.5" font-weight="600" letter-spacing="1.2">TECH STACK</text>
    <g transform="translate(34,168)">
      <g class="tag">
        <rect x="0" y="0" width="62" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="31" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Next.js</text>
      </g>
      <g class="tag">
        <rect x="70" y="0" width="62" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="101" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Firebase</text>
      </g>
      <g class="tag">
        <rect x="140" y="0" width="66" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="173" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Supabase</text>
      </g>
      <g class="tag">
        <rect x="214" y="0" width="72" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="250" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Gemini AI</text>
      </g>
    </g>

    <!-- Repository -->
    <g transform="translate(34,222)">
      <text x="0" y="0" fill="#64748b" font-size="10.5" font-weight="600" letter-spacing="1.2">REPOSITORY</text>
      <rect x="0" y="10" width="322" height="38" rx="8" fill="#0b1220" stroke="#1e293b" stroke-width="0.8"/>
      <!-- GitHub glyph -->
      <g transform="translate(10,20)">
        <circle cx="9" cy="9" r="9" fill="#5eead4" opacity="0.15"/>
        <path d="M9 3.2a5.8 5.8 0 0 0-1.83 11.3c.29.05.4-.13.4-.28v-1c-1.61.35-1.95-.77-1.95-.77-.26-.66-.64-.84-.64-.84-.52-.36.04-.35.04-.35.58.04.88.6.88.6.52.88 1.35.63 1.68.48.05-.37.2-.63.36-.77-1.28-.15-2.63-.64-2.63-2.86 0-.63.22-1.15.6-1.56-.06-.15-.26-.75.06-1.56 0 0 .49-.16 1.6.6a5.5 5.5 0 0 1 2.9 0c1.11-.76 1.6-.6 1.6-.6.32.81.12 1.41.06 1.56.37.41.6.93.6 1.56 0 2.23-1.35 2.71-2.64 2.85.21.18.39.53.39 1.07v1.58c0 .15.11.33.4.28A5.8 5.8 0 0 0 9 3.2z" fill="#5eead4"/>
      </g>
      <text x="36" y="34" fill="#5eead4" font-size="11" class="mono">github.com/ComradeMohan/saveetha-companion</text>
    </g>

    <!-- Bottom animated underline -->
    <line x1="34" y1="300" x2="336" y2="300" stroke="#1e293b" stroke-width="1"/>
    <line x1="34" y1="300" x2="336" y2="300" stroke="url(#accentTeal)" stroke-width="2" class="underline"/>

    <!-- Footer meta -->
    <g transform="translate(34,320)">
      <circle cx="4" cy="6" r="3" fill="#22c55e" class="dot"/>
      <text x="14" y="10" fill="#94a3b8" font-size="10.5">Live</text>
      <text x="60" y="10" fill="#475569" font-size="10.5">•</text>
      <text x="72" y="10" fill="#94a3b8" font-size="10.5">v1.4.0</text>
      <text x="260" y="10" fill="#5eead4" font-size="10.5" font-weight="600">View →</text>
    </g>
  </g>

  <!-- ===================== RIGHT CARD: UniVault ===================== -->
  <g>
    <rect x="387" y="16" width="355" height="348" rx="16" fill="url(#cardBg2)" stroke="#1f2937" stroke-width="1"/>

    <rect x="387.6" y="16.6" width="353.8" height="346.8" rx="15.6" class="card-border-2"/>

    <rect x="387.6" y="16.6" width="353.8" height="346.8" rx="15.6"
          fill="none" stroke="#c4b5fd" stroke-width="2" class="orbit"/>

    <rect x="387" y="16" width="355" height="2.5" rx="1" fill="url(#accentPurple)" filter="url(#softGlow)"/>

    <g clip-path="url(#clip2)">
      <rect class="shine-band" x="311" y="16" width="120" height="348" fill="url(#shine2)" opacity="0.7" transform="skewX(-18)"/>
    </g>

    <!-- Category pill -->
    <g class="pill-pulse">
      <rect x="627" y="34" width="102" height="24" rx="12" fill="#2e1065" stroke="#8b5cf6" stroke-width="0.6"/>
      <circle cx="641" cy="46" r="3" fill="#c4b5fd" class="dot"/>
      <text x="649" y="50" fill="#c4b5fd" font-size="11" font-weight="600">Android App</text>
    </g>

    <text x="405" y="76" fill="#f1f5f9" font-size="26" class="title">UniVault</text>

    <text x="405" y="106" fill="#94a3b8" font-size="12.5">Native mobile vault for academic</text>
    <text x="405" y="123" fill="#94a3b8" font-size="12.5">resources, built for Android students.</text>

    <text x="405" y="156" fill="#64748b" font-size="10.5" font-weight="600" letter-spacing="1.2">TECH STACK</text>
    <g transform="translate(405,168)">
      <g class="tag">
        <rect x="0" y="0" width="58" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="29" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Kotlin</text>
      </g>
      <g class="tag">
        <rect x="66" y="0" width="46" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="89" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">PHP</text>
      </g>
      <g class="tag">
        <rect x="120" y="0" width="66" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="153" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Android</text>
      </g>
      <g class="tag">
        <rect x="194" y="0" width="56" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.6"/>
        <text x="222" y="16" text-anchor="middle" fill="#cbd5e1" font-size="11">Room</text>
      </g>
    </g>

    <g transform="translate(405,222)">
      <text x="0" y="0" fill="#64748b" font-size="10.5" font-weight="600" letter-spacing="1.2">REPOSITORY</text>
      <rect x="0" y="10" width="322" height="38" rx="8" fill="#0b1220" stroke="#1e293b" stroke-width="0.8"/>
      <g transform="translate(10,20)">
        <circle cx="9" cy="9" r="9" fill="#c4b5fd" opacity="0.15"/>
        <path d="M9 3.5l1.3 3.9h4.1l-3.3 2.4 1.3 3.9L9 11.3l-3.4 2.4 1.3-3.9L3.6 7.4h4.1z" fill="#c4b5fd"/>
      </g>
      <text x="36" y="34" fill="#c4b5fd" font-size="11" class="mono">play.google.com/store/apps/details?id=…</text>
    </g>

    <line x1="405" y1="300" x2="707" y2="300" stroke="#1e293b" stroke-width="1"/>
    <line x1="405" y1="300" x2="707" y2="300" stroke="url(#accentPurple)" stroke-width="2" class="underline"/>

    <g transform="translate(405,320)">
      <circle cx="4" cy="6" r="3" fill="#22c55e" class="dot"/>
      <text x="14" y="10" fill="#94a3b8" font-size="10.5">Published</text>
      <text x="80" y="10" fill="#475569" font-size="10.5">•</text>
      <text x="92" y="10" fill="#94a3b8" font-size="10.5">v2.1.0</text>
      <text x="260" y="10" fill="#c4b5fd" font-size="10.5" font-weight="600">Install →</text>
    </g>
  </g>
</svg>
