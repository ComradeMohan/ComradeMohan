<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 230" width="100%" height="100%">
  <defs>
    <!-- Fonts styling -->
    <style>
:root{--bg-card:var(--bg-card);--border-1:var(--border-1);--border-2:var(--border-2);--grid:var(--border-1);--accent:var(--accent);--accent-soft:var(--accent-soft);--pill:var(--pill);--title:var(--title);--text:var(--text);--chip:var(--chip);}
@media (prefers-color-scheme: dark){
:root{--bg-card:#0f172a;--border-1:#1e293b;--border-2:#334155;--grid:#1e293b;--accent:#2dd4bf;--accent-soft:rgba(45,212,191,.14);--pill:rgba(45,212,191,.08);--title:#e2e8f0;--text:#94a3b8;--chip:#0b1220;}
}

      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .title {
        font-weight: 800;
        font-size: 19px;
        fill: var(--title);
        letter-spacing: -0.02em;
      }
      .repo-name {
        font-weight: 500;
        font-size: 11.5px;
        fill: var(--accent);
        letter-spacing: -0.01em;
      }
      .subtitle {
        font-weight: 600;
        font-size: 13.5px;
        fill: var(--text);
        letter-spacing: -0.01em;
      }
      .description {
        font-weight: 400;
        font-size: 12.5px;
        fill: var(--text);
        line-height: 1.45;
      }
      .chip-text {
        font-weight: 500;
        font-size: 11.5px;
        fill: var(--title);
      }
      .badge-text {
        font-weight: 600;
        font-size: 10px;
        fill: var(--accent);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .data-text {
        font-weight: 600;
        font-size: 11px;
        fill: var(--accent);
        letter-spacing: -0.01em;
      }

      /* Premium Animations */
      .glow-pulse {
        animation: pulseGlow 4s ease-in-out infinite alternate;
        transform-origin: 392px 6px;
      }
      .glow-pulse-right {
        animation: pulseGlow 4s ease-in-out 2s infinite alternate;
        transform-origin: 792px 6px;
      }
      @keyframes pulseGlow {
        0% { opacity: 0.35; transform: scale(0.92); }
        100% { opacity: 0.9; transform: scale(1.08); }
      }

      .float-icon {
        animation: floatMotion 3.5s ease-in-out infinite;
      }
      @keyframes floatMotion {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }

      .shimmer-bar-left {
        animation: shimmerMoveLeft 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes shimmerMoveLeft {
        0% { transform: translateX(-400px); }
        35%, 100% { transform: translateX(400px); }
      }

      .shimmer-bar-right {
        animation: shimmerMoveRight 5s cubic-bezier(0.4, 0, 0.2, 1) 2.5s infinite;
      }
      @keyframes shimmerMoveRight {
        0% { transform: translateX(-400px); }
        35%, 100% { transform: translateX(400px); }
      }

      .dot-pulse {
        animation: dotBlink 2s ease-in-out infinite alternate;
      }
      @keyframes dotBlink {
        0% { opacity: 0.3; }
        100% { opacity: 1; }
      }

      .accent-line-pulse {
        animation: lineGlow 3s ease-in-out infinite alternate;
      }
      @keyframes lineGlow {
        0% { opacity: 0.7; stroke-width: 3; }
        100% { opacity: 1; stroke-width: 4; }
      }
    </style>

    <!-- Filters for premium UI feel (subtle shadow for light mode) -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="card-border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--border-1)"/>
      <stop offset="40%" stop-color="var(--border-2)"/>
      <stop offset="100%" stop-color="var(--border-1)"/>
    </linearGradient>

    <radialGradient id="glow-left" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-right" cx="100%" cy="0%" r="90%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0"/>
      <stop offset="50%" stop-color="var(--accent)" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </linearGradient>

    <!-- Blueprint tiny grid pattern -->
    <pattern id="blueprint-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--border-1)" stroke-width="1" opacity="0.25"/>
    </pattern>

    <!-- Clips for rounded card contents -->
    <clipPath id="card-clip-left">
      <rect x="8" y="6" width="384" height="218" rx="14"/>
    </clipPath>
    <clipPath id="card-clip-right">
      <rect x="408" y="6" width="384" height="218" rx="14"/>
    </clipPath>
  </defs>

  <!-- Transparent Background Canvas for Seamless GitHub Integration -->

  <!-- ==================== LEFT CARD: SaveethaHub ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="8" y="6" width="384" height="218" rx="14" fill="var(--bg-card)" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#card-clip-left)">
      <rect x="8" y="6" width="384" height="218" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse" cx="392" cy="6" r="220" fill="url(#glow-left)"/>
      <rect class="shimmer-bar-left" x="8" y="6" width="220" height="218" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="8" y1="6" x2="392" y2="6" stroke="var(--accent)" stroke-width="3.5"/>
    </g>

    <!-- Corner Accent Bracket -->
    <path d="M 20 24 L 20 16 L 28 16" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Header Row: Logo Icon NEXT TO Title -->
    <g transform="translate(24, 22)">
      <g class="float-icon">
        <rect x="0" y="0" width="34" height="34" rx="7" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1.2"/>
        <circle cx="6" cy="6" r="2" fill="#EF4444"/>
        <circle cx="11" cy="6" r="2" fill="#F59E0B"/>
        <circle cx="16" cy="6" r="2" fill="#10B981"/>
        <rect x="4" y="11" width="26" height="2.5" rx="1" fill="var(--border-2)"/>
        <rect x="4" y="16" width="10" height="10" rx="1.5" fill="var(--accent)" fill-opacity="0.1" stroke="var(--accent)" stroke-width="0.8"/>
        <rect x="17" y="16" width="13" height="2" rx="1" fill="var(--text)"/>
        <rect x="17" y="20" width="13" height="2" rx="1" fill="var(--text)"/>
        <rect x="17" y="24" width="8" height="2" rx="1" fill="var(--text)"/>
      </g>

      <text x="44" y="18" class="title">SaveethaHub</text>
      <text x="44" y="31" class="repo-name">ComradeMohan / saveetha-companion</text>
    </g>

    <!-- Category Badge (Top-Right) -->
    <g transform="translate(296, 22)">
      <rect x="0" y="0" width="84" height="22" rx="11" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1"/>
      <text x="42" y="14" class="badge-text" text-anchor="middle">WEB PLATFORM</text>
    </g>

    <!-- Subtitle -->
    <text x="24" y="76" class="subtitle">Academic platform built for SIMATS students.</text>

    <!-- Description (High Contrast & Perfect Readability) -->
    <text x="24" y="98" class="description">Full-stack platform helping university students with</text>
    <text x="24" y="115" class="description">study resources, calculators, AI tools, and notes.</text>

    <!-- Accent Divider -->
    <line x1="24" y1="131" x2="376" y2="131" stroke="var(--border-1)" stroke-width="1"/>

    <!-- Bottom Tech Chips & Data Badge -->
    <g transform="translate(24, 143)">
      <rect x="0" y="0" width="62" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="10" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="18" y="15" class="chip-text">Next.js</text>

      <rect x="68" y="0" width="66" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="78" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="86" y="15" class="chip-text">Firebase</text>

      <rect x="140" y="0" width="70" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="150" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="158" y="15" class="chip-text">Supabase</text>

      <rect x="216" y="0" width="72" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="226" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="234" y="15" class="chip-text">Gemini AI</text>
    </g>

    <!-- Data Row Badge (Fills lower space) -->
    <g transform="translate(24, 173)">
      <rect x="0" y="0" width="352" height="23" rx="11.5" fill="var(--pill)" stroke="var(--accent)" stroke-width="1"/>
      <g transform="translate(10, 5)">
        <path d="M5 1a4 4 0 0 0-1.3 7.8c.2.1.3 0 .3-.2v-.7c-1.1.2-1.3-.6-1.3-.6-.2-.4-.4-.6-.4-.6-.3-.2 0-.2 0-.2.4 0 .6.3.6.3.4.6 1 .4 1.2.3 0-.3.2-.4.3-.6-.9-.1-1.8-.4-1.8-2 0-.4.1-.8.4-1.1a1.5 1.5 0 0 1 .1-1.1s.3-.1 1.1.3a3.8 3.8 0 0 1 2 0c.8-.4 1.1-.3 1.1-.3a1.5 1.5 0 0 1 .1 1.1c.3.3.4.7.4 1.1 0 1.6-.9 1.9-1.8 2 .2.2.3.4.3.8v1.2c0 .2.1.3.3.2A4 4 0 0 0 5 1z" fill="var(--accent)"/>
      </g>
      <text x="26" y="16" class="data-text">1000+ Active Students • Open Source</text>
    </g>
  </g>

  <!-- ==================== RIGHT CARD: UniVault ==================== -->
  <g filter="url(#card-shadow)">
    <!-- Base Card Frame -->
    <rect x="408" y="6" width="384" height="218" rx="14" fill="var(--bg-card)" stroke="url(#card-border-grad)" stroke-width="1.5"/>

    <!-- Inside Card Contents (Clipped) -->
    <g clip-path="url(#card-clip-right)">
      <rect x="408" y="6" width="384" height="218" fill="url(#blueprint-grid)"/>
      <circle class="glow-pulse-right" cx="792" cy="6" r="220" fill="url(#glow-right)"/>
      <rect class="shimmer-bar-right" x="408" y="6" width="220" height="218" fill="url(#shimmer-grad)"/>
      <line class="accent-line-pulse" x1="408" y1="6" x2="792" y2="6" stroke="var(--accent)" stroke-width="3.5"/>
    </g>

    <!-- Corner Accent Bracket -->
    <path d="M 420 24 L 420 16 L 428 16" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Header Row: Logo Icon NEXT TO Title -->
    <g transform="translate(424, 22)">
      <g class="float-icon">
        <rect x="0" y="0" width="34" height="34" rx="7" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1.2"/>
        <g transform="translate(7, 5)" fill="var(--accent)">
          <path d="M3 5.5 A 5.5 5.5 0 0 1 14 5.5 Z"/>
          <line x1="5" y1="2.5" x2="3" y2="0.8" stroke="var(--accent)" stroke-width="1.1" stroke-linecap="round"/>
          <line x1="12" y1="2.5" x2="14" y2="0.8" stroke="var(--accent)" stroke-width="1.1" stroke-linecap="round"/>
          <circle cx="6" cy="3.5" r="0.7" fill="var(--chip)"/>
          <circle cx="11" cy="3.5" r="0.7" fill="var(--chip)"/>
          <rect x="2" y="7" width="13" height="9" rx="1.5"/>
          <rect x="-0.6" y="7" width="1.8" height="8" rx="0.9"/>
          <rect x="15.8" y="7" width="1.8" height="8" rx="0.9"/>
          <rect x="4.5" y="16.5" width="2.4" height="3.5" rx="1"/>
          <rect x="10.1" y="16.5" width="2.4" height="3.5" rx="1"/>
        </g>
      </g>

      <text x="44" y="18" class="title">UniVault</text>
      <text x="44" y="31" class="repo-name">com.simats.univault</text>
    </g>

    <!-- Category Badge (Top-Right) -->
    <g transform="translate(696, 22)">
      <rect x="0" y="0" width="84" height="22" rx="11" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1"/>
      <text x="42" y="14" class="badge-text" text-anchor="middle">ANDROID APP</text>
    </g>

    <!-- Subtitle -->
    <text x="424" y="76" class="subtitle">Android exam preparation app.</text>

    <!-- Description (High Contrast & Perfect Readability) -->
    <text x="424" y="98" class="description">Android app for university students featuring</text>
    <text x="424" y="115" class="description">structured resources &amp; previous exam papers.</text>

    <!-- Accent Divider -->
    <line x1="424" y1="131" x2="776" y2="131" stroke="var(--border-1)" stroke-width="1"/>

    <!-- Bottom Tech Chips & Data Badge -->
    <g transform="translate(424, 143)">
      <rect x="0" y="0" width="58" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="10" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="18" y="15" class="chip-text">Kotlin</text>

      <rect x="64" y="0" width="48" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="74" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="82" y="15" class="chip-text">PHP</text>

      <rect x="118" y="0" width="64" height="22" rx="11" fill="var(--chip)" stroke="var(--border-1)" stroke-width="1"/>
      <circle class="dot-pulse" cx="128" cy="11" r="2.5" fill="var(--accent)"/>
      <text x="136" y="15" class="chip-text">Android</text>
    </g>

    <!-- Data Row Badge (Fills lower space) -->
    <g transform="translate(424, 173)">
      <rect x="0" y="0" width="352" height="23" rx="11.5" fill="var(--pill)" stroke="var(--accent)" stroke-width="1"/>
      <g transform="translate(10, 5)">
        <path d="M3 1.5l6 4.5-6 4.5z" fill="var(--accent)"/>
      </g>
      <text x="24" y="16" class="data-text">Google Play Store Verified • Past Papers &amp; Resources</text>
    </g>
  </g>
</svg>
