name: Update LeetCode Cards

on:
  schedule:
    # Every day at 07:30 UTC = 1:00 PM IST
    - cron: "30 7 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create folder
        run: mkdir -p assets/leetcode

      - name: Download Dark Card
        run: |
          curl -L \
          "https://leetcard.jacoblin.cool/comrademohan?theme=dark&ext=heatmap" \
          -o assets/leetcode/leetcode-dark.svg

      - name: Download Light Card
        run: |
          curl -L \
          "https://leetcard.jacoblin.cool/comrademohan?theme=default&ext=heatmap" \
          -o assets/leetcode/leetcode-light.svg

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/leetcode/*.svg

          git diff --cached --quiet && exit 0

          git commit -m "chore: update LeetCode cards"

          git push
